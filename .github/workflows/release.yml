name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, for example 7.8.0-beta.1 or v7.8.0-beta.1"
        required: true
        type: string

permissions:
  contents: read

jobs:
  resolve:
    name: Resolve release target
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Check out repository metadata
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: meta
        shell: bash
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF_TYPE}" == "tag" ]]; then
            raw_version="${GITHUB_REF_NAME}"
          else
            raw_version="${INPUT_VERSION}"
          fi

          version="${raw_version#v}"
          tag="v${version}"

          if [[ -z "${version}" || ! "${version}" =~ ^[0-9]+(\.[0-9]+)*([.-][A-Za-z0-9]+)*$ ]]; then
            echo "::error::Invalid version input: ${raw_version}"
            exit 1
          fi

          {
            echo "version=${version}"
            echo "tag=${tag}"
          } >> "${GITHUB_OUTPUT}"

  release:
    name: Verify and publish release
    runs-on: ubuntu-latest
    needs: resolve
    permissions:
      contents: write
    concurrency:
      group: release-${{ needs.resolve.outputs.tag }}
      cancel-in-progress: false

    steps:
      - name: Check out repository metadata
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve.outputs.tag }}

      - name: Verify release tag exists
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force --tags origin
          tag="${{ needs.resolve.outputs.tag }}"
          if ! git rev-parse --verify --quiet "refs/tags/${tag}^{commit}" >/dev/null; then
            echo "::error::Tag ${tag} does not exist. Push the tag before creating a release."
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Rebuild and verify committed userscript
        shell: bash
        run: |
          set -euo pipefail
          npm run build
          git diff --exit-code -- dist

      - name: Run source tests
        run: npm run test:source

      - name: Run local release checks
        shell: bash
        run: |
          set -euo pipefail
          node tools/check-all.mjs "${{ needs.resolve.outputs.version }}"

      - name: Prepare release asset and notes
        id: release
        shell: bash
        run: |
          set -euo pipefail
          node tools/prepare-github-release.mjs "${{ needs.resolve.outputs.version }}" "${GITHUB_OUTPUT}"

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag }}
          UPLOAD_PATH: ${{ steps.release.outputs.upload_path }}
          NOTES_PATH: ${{ steps.release.outputs.notes_path }}
          PRERELEASE: ${{ steps.release.outputs.prerelease }}
        run: |
          set -euo pipefail

          if gh release view "${TAG}" >/dev/null 2>&1; then
            release_id="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" --jq '.id')"

            gh release edit "${TAG}" \
              --title "${TAG}" \
              --notes-file "${NOTES_PATH}"

            if [[ "${PRERELEASE}" == "true" ]]; then
              gh api \
                --method PATCH \
                "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
                -F prerelease=true \
                -f make_latest=false
            else
              gh api \
                --method PATCH \
                "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
                -F prerelease=false \
                -f make_latest=true
            fi

            gh release upload "${TAG}" "${UPLOAD_PATH}" --clobber
            exit 0
          fi

          args=(
            release create "${TAG}" "${UPLOAD_PATH}"
            --title "${TAG}"
            --notes-file "${NOTES_PATH}"
            --verify-tag
          )

          if [[ "${PRERELEASE}" == "true" ]]; then
            args+=(--prerelease)
            args+=(--latest=false)
          else
            args+=(--latest)
          fi

          gh "${args[@]}"
